<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>従業員管理システム</title>
    <link rel="stylesheet" href="../../static/css/bootstrap.css" th:href="@{/css/bootstrap.css}" />
    <link rel="stylesheet" href="../../static/css/style.css" th:href="@{/css/style.css}" />
    <!--[if lt IE 9]>
      <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
      <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
</head>

<body>
    <div class="container">
        <nav class="navbar navbar-default">
            <div class="container-fluid">
                <!-- Brand and toggle get grouped for better mobile display -->
                <div class="navbar-header">
                    <a class="navbar-brand" href="/administrator/login.html" th:href="@{/}">
                        <!-- 企業ロゴ -->
                        <img src="../../static/img/header_logo_small.png" th:src="@{/img/header_logo_small.png}" />
                    </a>
                </div>

                <!-- Collect the nav links, forms, and other content for toggling -->
                <div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">
                </div>
                <!-- /.navbar-collapse -->
            </div>
            <!-- /.container-fluid -->
        </nav>



        <!-- table -->
        <div class="row">
            <div class="col-lg-offset-2 col-lg-8 col-md-offset-2 col-md-8 col-sm-12 col-xs-12">
                <!-- ここから上を編集する必要はありません -->
                <div class="text-center" style="padding: 50px 10px;">
                    <h1 class="text-danger" style="font-size: 80px; font-weight: bold; margin: 0 0 20px 0;">404</h1>

                    <h3 style="font-weight: bold; margin-bottom: 15px;">ページが見つかりません</h3>

                    <p class="text-muted" style="line-height: 1.8; margin-bottom: 30px;">
                        アクセスしようとしたページは削除されたか、<br>
                        URLが間違っている可能性があります。
                    </p>

                    <a href="/administrator/login.html" th:href="@{/}" class="btn btn-primary btn-lg"
                        style="width: 200px;">
                        トップへ戻る
                    </a>
                </div>
                <!-- ここから下を編集する必要はありません -->
            </div>
        </div>
    </div>
    <!-- end container -->

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
    <script src="../../static/js/bootstrap.min.js" th:src="@{/js/bootstrap.min.js}"></script>
</body>

</html>
